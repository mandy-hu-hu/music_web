<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Web</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="main-page">
    <header>
        <h2 class="logo">Music Web</h2>
        <nav class="navigation">
            <a href="#">Home</a>
            <a href="#" id="btnLogout">Logout</a>
        </nav>
    </header>

    <main class="dashboard">

        <!-- User Area -->
        <section class="area user-area">
            <h3>User</h3>
            <div class="user-info">
                <ion-icon name="person-circle" class="user-avatar"></ion-icon>
                <p class="user-name" id="displayUsername"></p>
                <p class="user-email" id="displayEmail"></p>
            </div>
        </section>

        <!-- Subscription Area -->
        <section class="area subscription-area">
            <h3>My Subscriptions</h3>
            <div id="subscriptionList" class="subscription-list">
                <p class="empty-msg">No subscriptions yet.</p>
            </div>
        </section>

        <!-- Query Area -->
        <section class="area query-area">
            <h3>Query</h3>
            <form id="queryForm" class="query-form">
                <div class="query-fields">
                    <div class="query-field">
                        <label for="qTitle">Title</label>
                        <input id="qTitle" type="text" autocomplete="off">
                    </div>
                    <div class="query-field">
                        <label for="qYear">Year</label>
                        <input id="qYear" type="text" autocomplete="off">
                    </div>
                    <div class="query-field">
                        <label for="qArtist">Artist</label>
                        <input id="qArtist" type="text" autocomplete="off">
                    </div>
                    <div class="query-field">
                        <label for="qAlbum">Album</label>
                        <input id="qAlbum" type="text" autocomplete="off">
                    </div>
                </div>
                <p id="queryError" class="query-error"></p>
                <button type="submit" class="btn query-btn">Query</button>
            </form>
            <div id="queryResults" class="query-results"></div>
        </section>

    </main>

    <script type="module">
        const API = "https://exb2yo4udg.execute-api.us-east-1.amazonaws.com/prod";

        const email = sessionStorage.getItem("loggedInEmail");
        const username = sessionStorage.getItem("loggedInUsername");
        if (!email) {
            globalThis.location.replace("index.html");
        }

        document.getElementById("displayUsername").textContent = username || email;
        document.getElementById("displayEmail").textContent = email;

        document.getElementById("btnLogout").addEventListener("click", (e) => {
            e.preventDefault();
            sessionStorage.removeItem("loggedInEmail");
            sessionStorage.removeItem("loggedInUsername");
            globalThis.location.href = "index.html?showLogin=true";
        });

        function makeSongCard(song, actionLabel, onAction) {
            const card = document.createElement("div");
            card.className = "song-card";

            const img = document.createElement("img");
            img.src = song.img_url || song.image_url;
            img.onerror = () => { img.src = song.image_url; };
            img.alt = song.artist;
            img.className = "song-img";

            const info = document.createElement("div");
            info.className = "song-info";

            const titleEl = document.createElement("span");
            titleEl.className = "song-title";
            titleEl.textContent = song.title;

            const artistEl = document.createElement("span");
            artistEl.className = "song-artist";
            artistEl.textContent = song.artist;

            const albumEl = document.createElement("span");
            albumEl.className = "song-album";
            albumEl.textContent = song.album + " (" + song.year + ")";

            info.append(titleEl, artistEl, albumEl);

            const btn = document.createElement("button");
            btn.className = actionLabel === "Remove" ? "btn-remove" : "btn-add";
            btn.textContent = actionLabel;
            btn.addEventListener("click", onAction);

            card.append(img, info, btn);
            return card;
        }

        async function renderSubscriptions() {
            const list = document.getElementById("subscriptionList");
            list.innerHTML = "<p class='empty-msg'>Loading...</p>";

            try {
                const res = await fetch(`${API}/subscriptions?email=${encodeURIComponent(email)}`);
                const raw = await res.json();
                const data = raw.body ? JSON.parse(raw.body) : raw;

                list.innerHTML = "";

                if (!data.ok) {
                    list.innerHTML = "<p class='empty-msg'>Failed to load subscriptions.</p>";
                    return;
                }

                const subs = data.data?.items || [];

                if (subs.length === 0) {
                    const msg = document.createElement("p");
                    msg.className = "empty-msg";
                    msg.textContent = "No subscriptions yet.";
                    list.appendChild(msg);
                    return;
                }

                subs.forEach(song => {
                    const card = makeSongCard(song, "Remove", async () => {
                        await fetch(`${API}/subscriptions`, {
                            method: "DELETE",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ email, song_id: song.song_id })
                        });
                        renderSubscriptions();
                    });
                    list.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                list.innerHTML = "<p class='empty-msg'>Error loading subscriptions.</p>";
            }
        }

        await renderSubscriptions();

        document.getElementById("queryForm").addEventListener("submit", (e) => {
            e.preventDefault();

            const title = document.getElementById("qTitle").value;
            const artist = document.getElementById("qArtist").value;
            const year = document.getElementById("qYear").value;
            const album = document.getElementById("qAlbum").value;

            const params = new URLSearchParams({ title, artist, year, album });

            const resultsDiv = document.getElementById("queryResults");
            const errorEl = document.getElementById("queryError");

            resultsDiv.innerHTML = "";
            errorEl.textContent = "";

            fetch(`${API}/music?${params}`)
                .then(res => res.json())
                .then(raw => {
                    console.log("RAW:", raw);
                    const data = raw.body ? JSON.parse(raw.body) : raw;
                    console.log("PARSED:", data);

                    if (!data.ok) {
                        errorEl.textContent = data.error || "Server error";
                        return;
                    }

                    const items = data.data?.items || [];

                    if (items.length === 0) {
                        resultsDiv.innerHTML = "<p class='empty-msg'>No result is retrieved.</p>";
                        return;
                    }

                    items.forEach(song => {
                        const card = makeSongCard(song, "Subscribe", async function () {
                            this.textContent = "Subscribing...";
                            this.disabled = true;
                            const r = await fetch(`${API}/subscriptions`, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ email, song })
                            });
                            const rRaw = await r.json();
                            const rData = rRaw.body ? JSON.parse(rRaw.body) : rRaw;
                            if (rData.ok) {
                                this.textContent = "Subscribed";
                                renderSubscriptions();
                            } else {
                                this.textContent = "Subscribe";
                                this.disabled = false;
                            }
                        });

                        resultsDiv.appendChild(card);
                    });
                })
                .catch(err => {
                    console.error(err);
                    errorEl.textContent = "Server error";
                });
        });

    </script>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>

</html>
